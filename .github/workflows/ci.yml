# ============================================================================
# CI/CD PIPELINE - GITHUB ACTIONS
# ============================================================================
#
# Bu workflow her push ve pull request'te otomatik calisir.
#
# JOBS:
#   1. lint     → golangci-lint ile kod kalite kontrolu
#   2. test     → go test ile birim testler
#   3. build    → Docker image build (multi-stage)
#   4. deploy   → main branch'a push oldugunda Docker Hub'a push
#
# ORNEK KULLANIM:
#   git push → lint + test + build otomatik calisir
#   PR ac    → lint + test + build + review
#   main'e merge → lint + test + build + deploy
#
# GEREKLIGINLER (GitHub repo Settings > Secrets):
#   DOCKER_USERNAME  → Docker Hub kullanici adi
#   DOCKER_PASSWORD  → Docker Hub access token
#
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.1.0"

jobs:
  # ========================================================================
  # JOB 1: LINT - KOD KALITE KONTROLU
  # ========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  # ========================================================================
  # JOB 2: TEST - BIRIM TESTLER
  # ========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  # ========================================================================
  # JOB 3: BUILD - DOCKER IMAGE BUILD
  # ========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - name: order-service
            dockerfile: cmd/order-service/Dockerfile
          - name: payment-service
            dockerfile: cmd/payment-service/Dockerfile
          - name: inventory-service
            dockerfile: cmd/inventory-service/Dockerfile
          - name: api-gateway
            dockerfile: cmd/api-gateway/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: ecommerce-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker images ecommerce-${{ matrix.service.name }}:${{ github.sha }}

  # ========================================================================
  # JOB 4: DEPLOY - DOCKER HUB PUSH (sadece main branch)
  # ========================================================================
  deploy:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - name: order-service
            dockerfile: cmd/order-service/Dockerfile
          - name: payment-service
            dockerfile: cmd/payment-service/Dockerfile
          - name: inventory-service
            dockerfile: cmd/inventory-service/Dockerfile
          - name: api-gateway
            dockerfile: cmd/api-gateway/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-${{ matrix.service.name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
