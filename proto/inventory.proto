syntax = "proto3";

package inventory;

option go_package = "github.com/suleymankursatdemir/ecommerce-platform/pkg/grpc/inventorypb";

service InventoryService {
  rpc CheckStock(CheckStockRequest) returns (CheckStockResponse);
}

message CheckStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message CheckStockResponse {
  bool available = 1;
  int32 current_stock = 2;
}
